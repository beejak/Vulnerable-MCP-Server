[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    sandbox: tests that verify sandbox mode behaviour
    exploit: tests that verify an attack triggers a flag
    ctf: tests for the CTF helper tool system
    scanner: tests requiring external scanner tools (mcp-scan etc.)
    slow: tests that take more than 2 seconds
